<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
</head>

<body>

<header class="header d-flex align-items-center justify-content-center">
    <div class="logo"></div>
    <h1 class="fw-bold m-0">Sustainable Box Trivia</h1>
</header>

<div class="container-fluid main-container">
    <div class="row h-100 text-center text-white fw-bold">

        <div class="col-md-4 left-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Join</h2>

            <input id="roomCode" class="form-control form-control-lg w-50 text-center" placeholder="Room Code">

            <button class="btn btn-primary btn-lg px-5" onclick="joinRoom()">
                Join
            </button>
        </div>

        <div class="col-md-4 right-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Host</h2>

            <button class="btn teacher-btn btn-lg px-5" onclick="launchMultiplayer()">
                Launch Multiplayer
            </button>
        </div>

        <div class="col-md-4 study-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Study</h2>

            <button class="btn student-btn btn-lg px-5" onclick="launchStudy()">
                Launch Study
            </button>
        </div>

    </div>
</div>

</body>
</html>
