<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sustainable Box Trivia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
    <script src="../public/js/main.js" defer></script>
    <script src="../public/js/websocket-client.js" defer></script>
</head>

<body>

<header class="header d-flex align-items-center justify-content-center">
    <div class="logo"></div>
    <h1 class="fw-bold m-0">Sustainable Box Trivia</h1>
</header>

<div class="container-fluid main-container">
    <div class="row h-100">

        <div class="col-md-6 left-panel d-flex flex-column justify-content-center align-items-center text-center">
            <h2 class="text-white display-5 fw-bold">Welcome</h2>
            <p class="text-white fs-3">Bababooey</p>
        </div>

        <div class="col-md-6 right-panel d-flex flex-column justify-content-center align-items-center text-center gap-4">
            <h2 class="text-white fw-bold">Continue as:</h2>

            <button class="btn student-btn btn-lg px-5" onclick="studentMenu()">
                Student (guest)
            </button>

            <button class="btn teacher-btn btn-lg px-5" onclick="loginAsProfessor()">
                Teacher (login)
            </button>

            <button class="btn teacher-btn btn-lg px-5" onclick="questionsManage()">
                Questions
            </button>

            <button class="btn teacher-btn btn-lg px-5" onclick="usersManage()">
                Users
            </button>
        </div>

    </div>
</div>

</body>
</html>
