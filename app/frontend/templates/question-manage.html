<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable Box Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="stylesheet" href="../public/css/questions.css">
    <script src="../public/js/main.js" defer></script>
    <script src="../public/js/questions.js" defer></script>
</head>

<body>
    <header class="header d-flex align-items-center justify-content-center">
        <div class="logo"></div>
        <h1 class="fw-bold m-0">Add Questions</h1>
        <div class="return">
            <button class="btn student-btn btn-lg px-5" onclick="home()">
                Return
            </button>
        </div>
    </header>

    <div class="container-fluid main-container">
        <div class="row h-100">

            <div class="col-md-6 left-panel d-flex flex-column justify-content-center align-items-center text-center">
                <h2 class="text-white display-5 fw-bold">Use AI</h2>
                <form class="form-container">
                    <label for="aiPrompr">Prompt:</label>
                    <input type="text" id="aiPrompt" name="aiPrompt" minlength="1" required/>
                    <input type="submit" value="Submit"/>
                </form>
                <div>
                    <button id="open-popup" class="btn btn-dark px-5">Questions</button>
                </div>
            </div>
                        

            <div class="col-md-6 right-panel d-flex flex-column justify-content-center align-items-center text-center gap-4">
                <h2 class="text-white fw-bold">Manual Question</h2>
                <form class="form-container" action="/api/questions" method="post" enctype="application/json">

                    <section>
                        <label for="question">Question:</label>
                        <input type="text" id="question" name="question" minlength="1" required"/>
                    </section>

                    <section>
                        <label for="correctAnswer">Correct Answer:</label>
                        <input type="text" id="correctAnswer" name="correctAnswer" minlength="1" required/>

                        <label for="wrongAnswer1">Incorrect Answers:</label>
                        <input type="text" id="wrongAnswer1" name="wrongAnswer1" minlength="1" required/>
                        <input type="text" id="wrongAnswer2" name="wrongAnswer2" minlength="1" required/>
                        <input type="text" id="wrongAnswer3" name="wrongAnswer3" minlength="1" required/>
                    </section>

                    <section>
                        <label for="category">Category:</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="1">Category 1</option>
                            <option value="2">Category 2</option>
                            <option value="3">Category 3</option>
                            <option value="4">Category 4</option>
                            <option value="5">Category 5</option>
                            <option value="6">Category 6</option>
                        </select>
                    </section>

                    <input type="hidden" name="ai" value="0"/>

                    <input type="submit" value="Submit"/>
                </form>
            </div>

        </div>
    </div>

    <div class="popup" id="popup">  
        <button class="btn btn-danger" id="close-popup">Close</button>
        <div class="popup-container">
            <div id="question-list"></div>
        </div>
    </div>

    <template id="questionDisplayTemplate">
        <h2 class="question"></h2>
        <h4 class="correctAnswer"></h4>
        <p class="wrongAnswer1"></p>
        <p class="wrongAnswer2"></p>
        <p class="wrongAnswer3"></p>
        <p class="category"></p>
        <p class="ai"></p>
    </template>

    <template id="questionEditTemplate">
          <div class="question-edit-container">
            <h2 class="text-white fw-bold">Edit Question</h2>
                <input id="edit-id" type="hidden" name="edit-id"/>
                <section>
                    <label for="edit-question">Question:</label>
                    <input type="text" id="edit-question" name="edit-question" minlength="1" required/>
                </section>
                <section>
                    <label for="edit-correctAnswer">Correct Answer:</label>
                    <input type="text" id="edit-correctAnswer" name="edit-correctAnswer" minlength="1" required/>
                    <label for="edit-wrongAnswer1">Incorrect Answers:</label>
                    <input type="text" id="edit-wrongAnswer1" name="edit-wrongAnswer1" minlength="1" required/>
                    <input type="text" id="edit-wrongAnswer2" name="edit-wrongAnswer2" minlength="1" required/>
                    <input type="text" id="edit-wrongAnswer3" name="edit-wrongAnswer3" minlength="1" required/>
                </section>
                <section>
                    <label for="edit-category">Category:</label>
                    <select id="edit-category" name="edit-category" required>
                        <option value="">Select a category</option>
                        <option value="1">Category 1</option>
                        <option value="2">Category 2</option>
                        <option value="3">Category 3</option>
                        <option value="4">Category 4</option>
                        <option value="5">Category 5</option>
                        <option value="6">Category 6</option>
                    </select>
                </section>
                <input id="edit-ai" type="hidden" name="edit-ai" value="0"/>
                <input id="edit-submit" type="submit" value="Submit"/>
            </div>
    </template>
</body>
</html>
