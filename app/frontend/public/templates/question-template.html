<!-- Use games.css with this-->

<template id="game-ui-template">
    <main id="question-container">
        <!-- Will put combinations of the following game ui items here-->
        <section class="next-question game-ui-item">
            <p>Next Question!</p>
        </section>
        <section class="question-text game-ui-item">
            <p>Question text...</p>
        </section>
        <section class="question-choices game-ui-item">
            <p class="question-choice choice-one">Choice 1</p>
            <p class="question-choice choice-two">Choice 2</p>
            <p class="question-choice choice-three">Choice 3</p>
            <p class="question-choice choice-four">Choice 4</p>
        </section>
        <!-- <section class="question-choices game-ui-item">
            This is how correct/incorrect/unpicked answers will be indicated once revealed
            <p class="question-choice choice-one incorrect">Choice 1 (incorrect)</p>
            <p class="question-choice choice-two unpicked">Choice 2</p>
            <p class="question-choice choice-three correct">Choice 3 (correct)</p>
            <p class="question-choice choice-four unpicked">Choice 4</p>
        </section> -->
        <section class="countdown game-ui-item">
            <!-- This will probably be changed in the future to be more reactive than text,
            but you can still style this block -->
            <p>Time remaining: 5 seconds</p>
        </section>
        <section class="correct-prompt game-ui-item">
            <p>Correct!</p>
        </section>
        <section class="incorrect-prompt game-ui-item">
            <p>Incorrect!</p>
        </section>

        <section class="self-ranking game-ui-item">
            <p>You are in 0th place!</p>
            <p>Keep it up!</p>
        </section>
        <section class="leaderboard game-ui-item">
            <p>Player: score</p>
            <p>Player: score</p>
            <p>Player: score</p>
            <p>Player: score</p>
            <p>Player: score</p>
        </section>
        <section class="next-question-btn game-ui-item">
            <button>Next Question</button>
        </section>

        <section class="new-game game-ui-item">
            <button>New Game</button>
        </section>
        <section class="return-to-lobby game-ui-item">
            <button>Return to lobby</button>
        </section>
    </main>
</template>
