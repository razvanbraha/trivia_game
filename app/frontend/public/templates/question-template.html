<!-- Use games.css with this-->
<template id="container">
    <main id="question-container">
        <!-- Will put game ui items here-->
    </main>
</template>

<template id="game-ui-items">
    <section class="next-question">
        <p>Next Question!</p>
    </section>
    <section class="question-text">
        <p>Question text...</p>
    </section>
    <section class="question-choices">
        <p class="question-choice choice-one">Choice 1</p>
        <p class="question-choice choice-two">Choice 2</p>
        <p class="question-choice choice-three">Choice 3</p>
        <p class="question-choice choice-four">Choice 4</p>
    </section>
    <section class="countdown">
        <!-- This will probably be changed in the future to be more reactive than text,
         but you can still style this block -->
        <p>Time remaining: 5 seconds</p>
    </section>
    <section class="correct-prompt">
        <p>Correct!</p>
    </section>
    <section class="incorrect-prompt">
        <p>Incorrect!</p>
    </section>

    <section class="self-ranking">
        <!-- TODO -->
    </section>
    <section class="leaderboard">
        <!-- TODO -->
    </section>

    <section class="new-game">
        <button>New Game</button>
    </section>
    <section class="return-to-lobby">
        <button>Return to lobby</button>
    </section>
</template>
