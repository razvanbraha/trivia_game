<!-- Intermitent Leaderboard (student)-->
     <main id="question-container">
        <section class="box">
                    <p>Move the cube with arrow keys or by clicking!</p>
                    <div class="box_container">
                        <div class="scene">
                            <div class="cube show-front">
                                <div class="cube__face cube__face--front">History & Evolution</div>
                                <div class="cube__face cube__face--back">Sustainability</div>
                                <div class="cube__face cube__face--right">Consumerism & Ethics</div>
                                <div class="cube__face cube__face--left">Production/Scalability</div>
                                <div class="cube__face cube__face--top">End-of-life & Data</div>
                                <div class="cube__face cube__face--bottom">Technical Aspects/Engineering</div>
                            </div>
                        </div>
                    </div>
        </section>
        <section class="self-ranking game-ui-item">
            <p>You are in 0th place!</p>
            <p>Keep it up!</p>
        </section>

        <section class="countdown game-ui-item">
            <div class="round-time-bar-background">
                <div class="round-time-bar" style="--duration: 8;">
                    <div></div>
                </div>
            </div>
        </section>
    </main>
