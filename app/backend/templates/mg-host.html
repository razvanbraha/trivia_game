<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lobby</title>
    <link rel="stylesheet" href="/public/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="/public/components/header.js" defer></script>
    <script src="/public/js/mg-host.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>    
<!-- FAVICON -->
    <link rel="icon" type="image/png" href="/public/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg" />
    <link rel="shortcut icon" href="/public/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Sustainable Box Trivia" />
    <meta name="theme-color" content="#9292ff"/>
    <!-- Installable App -->
    <link rel="manifest" href="/public/site.webmanifest"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sustainable Box Trivia">
    <meta name="apple-mobile-web-app-title" content="Box Trivia">
    <meta name="theme-color" content="#9292ff">
    <meta name="msapplication-navbutton-color" content="#9292ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>

<body>

<header-component></header-component>

<div class="container-fluid main-container">
<div class="row h-100 text-white">

<div class="col-md-4 left-panel p-4">

    <h3>Settings</h3>

    <label class="mt-3">Questions</label>
    <label class="mt-3">Questions: <span id="questionCount">25</span></label>
    <input type="range" min="10" max="50" value="25" id="questionSlider" class="form-range">

    <h5 class="mt-4">Categories</h5>
    <div>
        <input type="checkbox" checked value="1">History & Evolution<br>
        <input type="checkbox" checked value="2">Technical Aspects & Engineering<br>
        <input type="checkbox" checked value="3">Sustainability<br>
        <input type="checkbox" checked value="4">Consumerism & Ethics<br>
        <input type="checkbox" checked value="5">End-of-Life & Data<br>
        <input type="checkbox" checked value="6">Logistics & Distribution<br>
    </div>

</div>

<div class="col-md-8 right-panel p-4">

    <h4>CODE: <span id="roomCode">----</span></h4>

    <h5 class="mt-4">Joinees</h5>
    <div id="players"></div>

    <div class="mt-5 d-flex gap-4">
        <button id="cancelRoomButton" class="btn btn-danger">Cancel</button>
        <button id="startGameButton" class="btn btn-primary"">Start</button>
    </div>

</div>

</div>
</div>
</body>
</html>
