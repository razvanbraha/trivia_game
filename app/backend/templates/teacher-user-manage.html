<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/questions.css">
    <script src="/public/js/users.js" defer></script>
    <script type="module" src="/public/components/header.js" defer></script>
</head>
<body>
    <header-component></header-component>
    <div class="container-fluid main-container">
        <div class="row h-100">
            <div class="col-md-6 left-panel d-flex flex-column justify-content-center align-items-center text-center">
                <h2 class="text-white display-5 fw-bold">User List</h2>
                <button id="open-popup" class="btn btn-dark px-5">Users</button>

            </div>
                        

            <div class="col-md-6 right-panel d-flex flex-column justify-content-center align-items-center text-center gap-4">
                <h2 class="text-white fw-bold">Add User</h2>
                <form id="userForm" class="form-container">

                    <section>
                        <label for="unityID">Unity ID:</label>
                        <input type="text" id="unityID" name="unityID" minlength="1" maxlength="8" required/>
                    </section>

                    <section>
                        <label for="note">Notes:</label>
                        <input type="text" id="note" name="note"/>
                    </section>

                    <section>
                        <label for="questionPriv">Question Privilege:</label>
                        <input type="checkbox" id="questionPriv" name="questionPriv"/>

                        <label for="userPriv">User Privilege:</label>
                        <input type="checkbox" id="userPriv" name="userPriv"/>
                    </section>

                    <input type="submit" value="Submit"/>
                </form>
            </div>
        </div>
    </div>

    <div class="popup" id="popup">  
        <button class="btn btn-danger" id="close-popup">Close</button>

        <div class="popup-container">
            <div id="user-list"></div>
            <div id="edit-user-container" class="mt-4" style="display:none;">
                <h3>Edit User</h3>

                <form id="editUserForm">
                    <input type="hidden" id="editUserID">

                    <div class="mb-2">
                        <label>Unity ID:</label>
                        <input type="text" id="editUnityID" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label>Note:</label>
                        <input type="text" id="editNote" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label>Question Privilege:</label>
                        <input type="checkbox" id="editQuestionPriv">
                    </div>

                    <div class="mb-2">
                        <label>User Privilege:</label>
                        <input type="checkbox" id="editUserPriv">
                    </div>

                    <button type="submit" class="btn btn-success">Save</button>
                    <button type="button" id="cancelEdit" class="btn btn-secondary">Cancel</button>
                </form>
            </div>
        </div>
    </div>

    <template id="userDisplayTemplate">
        <h2 class="unityID"></h2>
        <p class="userID"></p>
        <p class="note"></p>
        <p class="questionPriv"></p>
        <p class="userPriv"></p>
    </template>
</body>
</html>
