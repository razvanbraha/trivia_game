<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <script type="module" src="/public/components/header.js" defer></script>
    <script src="/public/js/student-menu.js" defer></script>
</head>

<body>

<header-component></header-component>

<div class="container-fluid main-container">
    <div class="row h-100 text-center text-white fw-bold">

        <div class="col-md-4 left-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Join</h2>

            <input id="roomCode" class="form-control form-control-lg w-50 text-center" placeholder="Room Code">

            <button id="joinRoomButton" class="btn btn-primary btn-lg px-5" onclick="joinRoom()">
                Join
            </button>
        </div>

        <div class="col-md-4 right-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Host</h2>

            <button id="launchMultiplayerButton" class="btn teacher-btn btn-lg px-5" onclick="launchMultiplayer()">
                Launch Multiplayer
            </button>
        </div>

        <div class="col-md-4 study-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Study</h2>

            <!-- <button id="launchStudyButton" class="btn student-btn btn-lg px-5"">
                Launch Study
            </button> -->
        </div>

    </div>
</div>
</body>
</html>
