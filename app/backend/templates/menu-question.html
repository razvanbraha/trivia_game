<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable Box Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/questions.css">
    <script type="module" src="/public/components/header.js" defer></script>
    <script src="/public/js/menu-question.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/public/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg" />
    <link rel="shortcut icon" href="/public/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Sustainable Box Trivia" />
    <meta name="theme-color" content="#9292ff"/>
    <!-- Installable App -->
    <link rel="manifest" href="/public/site.webmanifest"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sustainable Box Trivia">
    <meta name="apple-mobile-web-app-title" content="Box Trivia">
    <meta name="theme-color" content="#9292ff">
    <meta name="msapplication-navbutton-color" content="#9292ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

</head>

<body class="vh-100 d-flex flex-column">
    <header-component style="flex-shrink: 0;"></header-component>

    <main class="row g-0 flex-grow-1" style="min-height: 0;">
        <section id="questionListPanel" class="col-md-6 h-100 d-flex flex-column left-panel p-0">
            <h2 class="text-white py-4 text-center mb-0">Existing Questions</h2>
            <div id="questionListContent" class="overflow-y-auto flex-grow-1 px-4 pb-4">
            </div>
        </section>

        <section id="addQuestionPanel" class="col-md-6 h-100 d-flex flex-column overflow-y-auto right-panel p-4">
            
            <div class="bg-white p-4 rounded shadow-sm mb-4">
                <h3 class="text-black fw-bold mb-3">Fill with AI</h3>
                <form id="aiForm" class="d-flex gap-2">
                    <input type="text" id="aiPrompt" name="aiPrompt" class="form-control" placeholder="Describe the question topic..." required/>
                    <button type="submit" class="btn btn-dark">Generate</button>
                </form>
            </div>

            <div class="bg-white p-4 rounded shadow-sm">
                <h3 class="text-black fw-bold mb-3">Question Details</h3>
                <form id="questionForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Question Text:</label>
                        <input type="text" id="question" name="question" class="form-control" autocomplete="off" required/>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Correct Answer:</label>
                        <input type="text" id="correctAnswer" name="correctAnswer" class="form-control border-success" autocomplete="off" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Incorrect Answers:</label>
                        <input type="text" id="wrongAnswer1" name="wrongAnswer1" class="form-control mb-2" placeholder="Option 1" autocomplete="off" required/>
                        <input type="text" id="wrongAnswer2" name="wrongAnswer2" class="form-control mb-2" placeholder="Option 2" autocomplete="off" required/>
                        <input type="text" id="wrongAnswer3" name="wrongAnswer3" class="form-control" placeholder="Option 3" autocomplete="off" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Category:</label>
                        <select id="category" name="category" class="form-select" required>
                            <option value="">Select a category</option>
                            <option value="1">History & Evolution</option>
                            <option value="2">Technical Aspects & Engineering</option>
                            <option value="3">Sustainability</option>
                            <option value="4">Consumerism & Ethics</option>
                            <option value="5">End-of-Life & Data</option>
                            <option value="6">Logistics & Distribution</option>
                        </select>
                    </div>

                    <input type="hidden" name="ai" id="ai" value="0"/>
                    <button type="submit" class="btn btn-primary w-100">Save Question</button>
                </form>
            </div>
        </section>
    </main>

    <template id="questionDisplayTemplate">
        <div class="questionDisplayContainer mb-3 p-3 d-flex flex-column rounded shadow-sm">
            <h4 class="question text-dark"></h4>
            <div class="answers-grid mt-2">
                <div class="correctAnswer p-2 rounded small mb-1"></div>
                <div class="wrongAnswer1 p-2 rounded small mb-1"></div>
                <div class="wrongAnswer2 p-2 rounded small mb-1"></div>
                <div class="wrongAnswer3 p-2 rounded small"></div>
            </div>
            <p class="ai text-muted small"></p>
            <div class="mt-3 d-flex justify-content-between align-items-center">
                <span class="badge bg-secondary category-label"></span>
                <div class="btn-group">
                    <button class="btn btn-sm btn-info edit-btn">Edit</button>
                    <button class="btn btn-sm btn-danger delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
