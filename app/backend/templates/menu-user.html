<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <link rel="stylesheet" href="/public/css/questions.css">
    <script src="/public/js/menu-user.js" defer></script>
    <script type="module" src="/public/components/header.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/public/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg" />
    <link rel="shortcut icon" href="/public/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Sustainable Box Trivia" />
    <meta name="theme-color" content="#9292ff"/>
    <!-- Installable App -->
    <link rel="manifest" href="/public/site.webmanifest"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sustainable Box Trivia">
    <meta name="apple-mobile-web-app-title" content="Box Trivia">
    <meta name="theme-color" content="#9292ff">
    <meta name="msapplication-navbutton-color" content="#9292ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>
<body class="vh-100 d-flex flex-column">

    <header-component style="flex-shrink: 0;"></header-component>

    <main class="container-fluid row m-0 flex-grow-1 g-0" style="min-height: 0;">
        <section id="userListPanel" class="left-panel col-md-6 h-100 d-flex flex-column p-4">
            <h3 class="text-white display-5 fw-bold mb-4 text-center">Existing Users</h2>

            <div id="userListContent" class="overflow-y-auto flex-grow-1 px-4 pb-4">
                <!-- dynamically populated by JS -->
            </div>
        </section>

        <section id="addUserPanel" class="right-panel col-md-6 h-100 d-flex flex-column p-4 align-items-center">
            <h3 class="text-white text-center fw-bold">Create New User</h2>

            <form id="userForm" class="form-container w-75 bg-white p-4 rounded shadow-sm">
                <div class="mb-3 text-start">
                    <label for="unityID" class="form-label text-black fw-bold">Unity ID:</label>
                    <input type="text" id="unityID" name="unityID" class="form-control border-secondary" minlength="1" maxlength="8" autocomplete="off" required/>
                </div>

                <div class="mb-3 text-start">
                    <label for="note" class="form-label text-black fw-bold">Note:</label>
                    <input type="text" id="note" name="note" class="form-control border-secondary" autocomplete="off"/>
                </div>

                <div class="mb-4 text-start">
                    
                    <div class="d-flex align-items-center mb-2">
                        <input type="checkbox" id="questionPriv" name="questionPriv" 
                            class="form-check-input border-secondary m-0" 
                            style="width: 20px; height: 20px; flex-shrink: 0;">
                        <label class="text-black ms-2 mb-0" for="questionPriv" style="cursor: pointer;">
                            Question Privilege
                        </label>
                    </div>

                    <div class="d-flex align-items-center">
                        <input type="checkbox" id="userPriv" name="userPriv" 
                            class="form-check-input border-secondary m-0" 
                            style="width: 20px; height: 20px; flex-shrink: 0;">
                        <label class="text-black ms-2 mb-0" for="userPriv" style="cursor: pointer;">
                            User Privilege
                        </label>
                    </div>

                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">Submit</button>
                </div>
            </form>
        </section>
    </main>

    <template id="userDisplayTemplate">
        <div class="user-card border p-3 mb-3 bg-light rounded text-dark text-start">
            <p class="userID text-muted small"></p>
            <h4 class="unityID"></h4>
            <p class="note mb-1"></p>
            <p class="u-priv"></p>
            <p class="q-priv"></p>
            <div class="button-group">
                <button class="btn btn-warning btn-sm edit-btn">Edit</button>
                <button class="btn btn-danger btn-sm delete-btn">Delete</button>
            </div>
        </div>
    </template>

    <template id="userEditTemplate">
        <div class="user-card border p-3 mb-3 bg-white rounded text-dark text-start">
            <form class="edit-user-form">
                <p class="userID text-muted small"></p>
                <h4 class="edit-unity-label"></h4>
                <input type="text" class="form-control form-control-sm edit-note-input">
                <div class="mb-2">
                    <label><input type="checkbox" class="edit-q-priv"> Question</label>
                </div>
                <div class="mb-2">
                    <label><input type="checkbox" class="edit-u-priv"> User</label>
                </div>
                <button type="submit" class="btn btn-success btn-sm">Save</button>
                <button type="button" class="btn btn-secondary btn-sm cancel-btn">Cancel</button>
            </form>
        </div>
    </template>
</body>
</html>
