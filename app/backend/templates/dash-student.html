<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/styles.css">
    <script type="module" src="/public/components/header.js" defer></script>
    <script src="/public/js/dash-student.js" defer></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/public/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg" />
    <link rel="shortcut icon" href="/public/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Sustainable Box Trivia" />
    <meta name="theme-color" content="#9292ff"/>
    <!-- Installable App -->
    <link rel="manifest" href="/public/site.webmanifest"/>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sustainable Box Trivia">
    <meta name="apple-mobile-web-app-title" content="Box Trivia">
    <meta name="theme-color" content="#9292ff">
    <meta name="msapplication-navbutton-color" content="#9292ff">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-starturl" content="/">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
</head>

<body>

<header-component></header-component>

<div class="container-fluid main-container">
    <div class="row h-100 text-center text-white fw-bold">

        <div class="col-md-6 left-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Join</h2>

            <input id="playerName" class="form-control form-control-lg w-50 text-center" placeholder="Name">

            <input id="roomCode" class="form-control form-control-lg w-50 text-center" placeholder="Room Code">

            <button id="joinRoomButton" class="btn btn-primary btn-lg px-5" style="background-color: #005A9C;" onclick="joinRoom()">
                Join
            </button>
        </div>

        <div class="col-md-6 study-panel d-flex flex-column justify-content-center align-items-center gap-4">
            <h2>Study</h2>

            <button id="launchStudyButton" class="btn student-btn btn-lg px-5"">
                Launch Study
            </button>
        </div>

    </div>
</div>
</body>
</html>
