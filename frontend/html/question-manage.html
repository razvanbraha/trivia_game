<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sustainable Box Trivia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/main.js" defer></script>
    <script src="../js/questions.js" defer></script>
</head>

<body>
    <header class="header d-flex align-items-center justify-content-center">
        <div class="logo"></div>
        <h1 class="fw-bold m-0">Add Questions</h1>
        <div class="return">
            <button class="btn student-btn btn-lg px-5" onclick="questionsAdd()">
                Return
            </button>
        </div>
    </header>

    <div class="container-fluid main-container">
        <div class="row h-100">
            <div id="questions-list"></div>
        </div>
    </div>

    <template id="questionDisplayTemplate">
        <h2 class="question"></h2>
        <h4 class="correctAnswer"></h4>
        <p class="wrongAnswer1"></p>
        <p class="wrongAnswer2"></p>
        <p class="wrongAnswer3"></p>
        <p class="category"></p>
        <p class="ai"></p>
    </template>
</body>
</html>
